name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run Unit + Integration Tests
        run: pytest -q

      - name: Smoke Scan Fixture
        run: |
          semantic-test scan tests/fixtures/regression_models/model_a --stdout none --format both --no-index
          test -d .semantic-test/runs
